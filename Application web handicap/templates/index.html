<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessibilité Vidéo Universelle</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        p.subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .options-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-card {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-card:hover {
            border-color: #93c5fd;
            background-color: #eff6ff;
        }

        .option-card input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
        }

        .option-card label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        /* --- Écran de chargement (Overlay) --- */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid var(--primary-color);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="container">
        <h1>Outil d'Accessibilité Vidéo</h1>
        <p class="subtitle">Adaptez le contenu multimédia à vos besoins spécifiques.</p>

        <form method="POST" action="/process" onsubmit="showLoading()">
            
            <div class="input-group">
                <label for="video_url">Lien de la vidéo (YouTube, Vimeo...) :</label>
                <input type="text" id="video_url" name="video_url" placeholder="Ex: https://www.youtube.com/watch?v=..." required>
            </div>

            <label>Choisissez vos adaptations :</label>
            <div class="options-grid">
                
                <div class="option-card" onclick="document.getElementById('sub').click()">
                    <input type="checkbox" id="sub" name="option_subtitles" checked onclick="event.stopPropagation()">
                    <label for="sub">🔠 Sous-titres à fort contraste (Malvoyance / Surdité)</label>
                </div>

                <div class="option-card" onclick="document.getElementById('audio').click()">
                    <input type="checkbox" id="audio" name="option_audio_boost" onclick="event.stopPropagation()">
                    <label for="audio">🦻 Boost de la clarté vocale (Presbyacousie)</label>
                </div>

            </div>

            <button type="submit" class="submit-btn">Lancer l'adaptation</button>
        </form>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h2>Traitement en cours...</h2>
        <p>Téléchargement, analyse par IA et encodage.<br>Veuillez ne pas fermer cette page.</p>
    </div>

    <script>
        function showLoading() {
            document.getElementById('loading-overlay').style.display = 'flex';
        }
    </script>

</body>
</html>
